services:
  mysql:
    image: mysql:8.4
    container_name: bi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cafeteria_db
      MYSQL_USER: gerson
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro

  postgres:
    image: postgres:16
    container_name: bi_postgres
    environment:
      POSTGRES_DB: cafeteria_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro

volumes:
  mysql_data:
  postgres_data: